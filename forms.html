<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <form>
        <label>Name:<input type="text"></label><br><br>
        <label>Phone number:<input type="number"></label><br><br>
        <label>Password:<input type="password"></label><br><br>
        <label>Email:<input type="email"></label><br><br>
        <label>File:<input type="file"></label><br><br>
        <label>DOB:<input type="date"></label><br><br>
        <label>Time:<input type="time"></label><br><br>

        <!--1st Method -->
        <input type="submit">
        <input type="reset">

        <!--2nd  Method -->
        <button type="submit">Hello</button><br>

        <h2>Checkbox</h2>
        <h4>My Hobbies</h4>
        <input type="checkbox"><label>Coding</label><br>
        <input type="checkbox"><label>Watching Sports</label><br>
        <input type="checkbox"><label>Sleeping💤</label><br>

        <h2>Radio button</h2>
        <h4>Gender</h4>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Others
    </form>
    
</body>
</html>
